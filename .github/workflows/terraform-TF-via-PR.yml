name: Trigger on pull_request (plan) and merge_group (apply) events with Terraform

on:
    pull_request:
        branches: [main]
        paths: [terraform/**, .github/workflows/terraform-TF-via-PR.yml]
        types: [opened, synchronize, reopened]

    merge_group:
        types: [checks_requested]

env:
    AWS_REGION: ${{ vars.AWS_REGION }}
    PLAN_ROLE: ${{ vars.TERRAFORM_PLAN_AWS_ROLE_ARN }}
    APPLY_ROLE: ${{ vars.TERRAFORM_APPLY_AWS_ROLE_ARN }}
    WORKING_DIRECTORY: terraform/

permissions:
    contents: read

jobs:
    terraform:
        timeout-minutes: 30
        runs-on: ubuntu-24.04
        if: github.event.pull_request.head.repo.full_name == github.repository
        defaults:
            run:
                working-directory: ${{env.WORKING_DIRECTORY}}

        permissions:
            contents: read # Required to checkout repository.
            id-token: write # Required to authenticate via OIDC.
            checks: write # Required to add status summary.
            actions: read # Required to download artifact.
            pull-requests: write # Required to add PR comment and label.
            security-events: write # Upload SARIF to GitHub Security tab.
        environment: ${{ github.event_name == 'merge_group' && 'production' }}

        concurrency:
            # All merge_group runs share one group so they queue, never race on state.
            cancel-in-progress: false
            group: ${{ github.workflow }}-${{ github.event_name == 'merge_group' && 'apply' || github.ref }}

        steps:
            - name: Checkout PR
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false # No GH token leaked to child processes.

            - name: Gitleaks
              id: gitleaks
              if: ${{github.event_name == 'pull_request'}}
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Authenticate AWS
              uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
              with:
                  aws-region: ${{vars.AWS_REGION}}
                  role-to-assume: >-
                      ${{github.event_name == 'merge_group' && env.APPLY_ROLE || env.PLAN_ROLE }}
                  role-duration-seconds: 900
                  role-session-name: gha-${{github.run_id}}-${{github.run_attempt}}-${{github.actor_id}}

            - name: Verify AWS credentials
              run: aws sts get-caller-identity

            - name: Create cache directory
              run: |
                  mkdir --parents $HOME/.terraform.d/plugin-cache
                  echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

            - name: Cache TF
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
              with:
                  path: ~/.terraform.d/plugin-cache
                  key: cache-tf-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
                  restore-keys: |
                      cache-tf-${{ runner.os }}-

            - name: Setup TF
              uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
              with:
                  terraform_wrapper: false

            - name: Verify provider lock integrity
              id: providerLock
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  terraform init -backend=false -input=false

                  terraform providers lock \
                    -platform=linux_amd64 \
                    -platform=linux_arm64 \
                    -platform=darwin_amd64 \
                    -platform=darwin_arm64 \
                    -platform=windows_amd64

                  # Any diff means the committed lock file is out of sync
                  if ! git diff --exit-code .terraform.lock.hcl; then
                    echo "::error::.terraform.lock.hcl is out of sync or has been tampered with."
                    echo "Run 'terraform providers lock' locally and commit the updated file."
                    exit 1
                  fi
                  echo "Provider lock file integrity confirmed."

            - name: Setup TFLint
              if: ${{github.event_name == 'pull_request'}}
              uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
              with:
                  cache: true
                  tflint_wrapper: true

            - name: Run TFLint
              id: tflint
              if: ${{ github.event_name == 'pull_request' }}
              continue-on-error: true
              env:
                  # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting

                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  tflint --init
                  set -o pipefail
                  tflint --recursive --format compact 2>&1 | tee /tmp/tflint_report.txt

            - name: Checkov static scan
              id: checkov
              if: ${{github.event_name == 'pull_request'}}
              uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
              with:
                  directory: ${{env.WORKING_DIRECTORY}}
                  framework: terraform
                  output_format: cli,sarif
                  output_file_path: console,/tmp/results-static.sarif

            - name: Upload SARIF file
              if: ${{github.event_name == 'pull_request'}}
              uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
              with:
                  sarif_file: /tmp/results-static.sarif
                  category: checkov-static

            - name: Provision TF
              id: tfProvision
              uses: op5dev/tf-via-pr@5a4229041e3c90818d85813d4e4a4d44f653d5e9 # v13.7.2
              with:
                  working-directory: terraform/
                  tool: terraform
                  command: ${{github.event_name == 'merge_group' && 'apply' || 'plan'}}
                  format: true
                  validate: true
                  arg-lock-timeout: 3m
                  arg-lock: ${{ github.event_name == 'merge_group' }}
                  plan-encrypt: ${{secrets.TF_ENCRYPTION}}
                  arg-backend-config: |
                      bucket=${{ secrets.AWS_S3_TERRAFORM_BACKEND }}
                      key=${{ vars.STATEFILE_KEY }}
                      region=${{ vars.AWS_REGION }}
                      encrypt=true
                      use_lockfile=true
                  plan-parity: true
                  retention-days: 2
                  expand-diff: true
                  tag-actor: never

            - name: Install Checkov for TF Plan
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  pip install \
                  --require-hashes \
                  --no-deps \
                  -r .github/requirements.txt \
                  --break-system-packages

            - name: Export plan to JSON
              id: planJson
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  terraform show -json "${{ steps.tfProvision.outputs.plan-file }}" | jq > tfplan.json

            - name: Checkov TF plan scan
              id: checkov_plan
              if: ${{ github.event_name == 'pull_request' }}
              continue-on-error: true
              run: |
                  checkov \
                    --file tfplan.json \
                    --framework terraform_plan \
                    --repo-root-for-plan-enrichment \
                        "${{ github.workspace }}/${{ env.WORKING_DIRECTORY }}" \
                    --deep-analysis \
                    --output cli \
                    --output sarif \
                    --output-file-path console,/tmp/results-plan.sarif \
                    --hard-fail-on HIGH,CRITICAL

            - name: Upload plan SARIF
              if: ${{ github.event_name == 'pull_request'}}
              uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
              with:
                  sarif_file: /tmp/results-plan.sarif
                  category: checkov-plan

            - name: Clear directory
              if: ${{failure() && github.event_name == 'merge_group' }}
              run: find ${{github.workspace}} -mindepth 1 -delete

            - name: Checkout main
              if: ${{failure() && github.event_name == 'merge_group'}}
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
                  ref: main

            - name: TF Rollback
              if: ${{failure() && github.event_name == 'merge_group'}}
              uses: op5dev/tf-via-pr@5a4229041e3c90818d85813d4e4a4d44f653d5e9 # v13.7.2
              with:
                  working-directory: ${{env.WORKING_DIRECTORY}}
                  tool: terraform
                  comment-pr: never
                  command: apply
                  arg-auto-approve: true
                  arg-lock-timeout: 3m
                  arg-lock: true
                  arg-backend-config: |
                      bucket=${{ secrets.AWS_S3_TERRAFORM_BACKEND }}
                      key=${{ vars.STATEFILE_KEY }}
                      region=${{ vars.AWS_REGION }}
                      encrypt=true
                      use_lockfile=true

        # TODO: Add job that notifies the team about the failure via email
        # TODO: Post comments to PR
